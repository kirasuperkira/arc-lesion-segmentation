name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: arc_lesion
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/arc_lesion

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r api/requirements.txt
          pip install -r tests/requirements.txt
          pip install ruff

      - name: Lint
        run: ruff check api tests

      - name: Apply database schema
        run: psql "$DATABASE_URL" -f db/schema.sql
        env:
          PGPASSWORD: postgres

      - name: Seed database from results/batch_results.csv
        run: python db/seed.py --dsn "$DATABASE_URL"

      - name: Run tests
        run: pytest tests/ -v

      - name: Build API Docker image
        run: docker build -f api/Dockerfile -t arc-lesion-api:ci .
